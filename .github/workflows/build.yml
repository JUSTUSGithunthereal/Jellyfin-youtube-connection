name: Build Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet publish Jellyfin.Plugin.YouTubeSearch -c Release -o out

      - name: Zip
        run: |
          cd out
          zip -r ../plugin.zip .

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.zip
